name: gymlog
description: App de treinos - GymLog
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Estado
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navegação
  go_router: ^13.2.0

  # HTTP
  dio: ^5.4.3+1

  # JSON codegen
  json_annotation: ^4.9.0

  # Persistência
  shared_preferences: ^2.2.3
  sqflite: ^2.3.3
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  integration_test:
    sdk: flutter
  mockito: ^5.4.4
  

flutter:
  uses-material-design: true
